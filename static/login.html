<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do — Log in</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>

  <!-- Left panel -->
  <div class="left">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <a href="/" class="logo">to<span>-do</span></a>

    <div class="welcome">
      <h2>Welcome<br/>Back!</h2>
      <p>Your tasks are waiting. Pick up right where you left off.</p>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right">
    <div class="form-box">
      <h1>Log in</h1>

      <div class="field">
        <label for="inp-email">Email</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input id="inp-email" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="error-msg" id="err-email">Please enter a valid email.</div>
      </div>

      <div class="field">
        <label for="inp-password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="inp-password" type="password" placeholder="Password" autocomplete="current-password" />
          <button class="toggle-pw" type="button" onclick="togglePw('inp-password', this)">👁</button>
        </div>
        <div class="error-msg" id="err-password">Password is required.</div>
      </div>

      <div class="form-meta">
        <label class="remember">
          <input type="checkbox" id="remember" />
          Remember Me
        </label>
        <a href="/static/forgot.html" class="forgot">Forgot Password?</a>
      </div>

      <button class="btn-primary" onclick="handleLogin()">Log in</button>

      <div class="or-divider">Or</div>

      <a href="/static/signup.html" class="btn-secondary">Sign up</a>
    </div>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
