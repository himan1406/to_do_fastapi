<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>to-do.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>

  <header>
    <a href="/" class="header-logo">to<span>-do</span></a>
    <span id="count-badge">0 tasks</span>
    <div class="header-right">
      <button id="btn-logout">Log out</button>
    </div>
  </header>

  <div class="layout">

    <!-- Sidebar -->
    <aside>
      <span class="sidebar-label">New task</span>

      <div class="s-field">
        <label for="inp-title">Title</label>
        <input id="inp-title" type="text" placeholder="What needs doing?" />
      </div>

      <div class="s-field">
        <label for="inp-desc">Description</label>
        <textarea id="inp-desc" rows="3" placeholder="Optional details…"></textarea>
      </div>

      <div class="s-field">
        <label for="inp-priority">Priority</label>
        <select id="inp-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>

      <button id="btn-add">Add task</button>

      <hr class="sidebar-divider" />

      <!-- Edit panel -->
      <div id="edit-panel">
        <div class="edit-header">
          <span class="sidebar-label">Edit task</span>
          <button id="btn-cancel-edit" title="Cancel">✕</button>
        </div>

        <div class="s-field">
          <label for="edit-title">Title</label>
          <input id="edit-title" type="text" />
        </div>

        <div class="s-field">
          <label for="edit-desc">Description</label>
          <textarea id="edit-desc" rows="3"></textarea>
        </div>

        <div class="s-field">
          <label for="edit-priority">Priority</label>
          <select id="edit-priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <button id="btn-save-edit">Save changes</button>
      </div>
    </aside>

    <!-- Main list -->
    <main>
      <div class="list-header">
        <h2>All tasks</h2>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="done">Done</button>
        </div>
      </div>

      <div id="empty">
        <div class="empty-icon">◻</div>
        <p>No tasks yet.<br/>Add one on the left.</p>
      </div>

      <div id="todo-list"></div>
    </main>

  </div>

  <div id="toast"></div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
